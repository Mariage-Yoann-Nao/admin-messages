<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Livre d'Or</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #B8935A; --gold-light: #E8D5B0; --gold-dark: #8A6B3A;
    --cream: #FAF7F2; --ink: #1C1812; --ink-soft: #4A4438;
    --ink-muted: #8A8070; --border: rgba(184,147,90,0.25); --radius: 4px;
  }
  body { font-family: 'Inter', sans-serif; background: #FAF7F2; color: var(--ink); min-height: 100vh; padding: 2rem 1rem; }
  .wrapper { max-width: 700px; margin: 0 auto; }
  header { text-align: center; padding: 2rem 0 2.5rem; border-bottom: 0.5px solid var(--border); margin-bottom: 2.5rem; }
  .eyebrow { font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
  h1 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 2.4rem; color: var(--ink); }
  .tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; border-bottom: 0.5px solid var(--border); overflow-x: auto; }
  .tab-btn { padding: 0.9rem 1.2rem; background: none; border: none; border-bottom: 2px solid transparent; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-muted); cursor: pointer; transition: color 0.2s, border-color 0.2s; white-space: nowrap; }
  .tab-btn.active { color: var(--gold-dark); border-bottom-color: var(--gold-dark); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .loading { text-align: center; padding: 2rem; color: var(--ink-muted); font-style: italic; }
  .messages-list { display: flex; flex-direction: column; gap: 1rem; }
  .message-item { background: #fff; border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: all 0.2s; }
  .message-item:hover { border-color: var(--gold); box-shadow: 0 2px 8px rgba(184,147,90,0.1); }
  .message-header { padding: 1.2rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
  .message-name { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: var(--ink); }
  .message-time { font-size: 0.75rem; color: var(--ink-muted); }
  .message-content { display: none; padding: 1.2rem 1.5rem; background: rgba(184,147,90,0.03); border-top: 0.5px solid var(--border); }
  .message-content.open { display: block; }
  .audio-player { width: 100%; height: 40px; margin-bottom: 1rem; }
  .photo-display { max-width: 100%; border-radius: var(--radius); margin-bottom: 1rem; border: 0.5px solid var(--border); }
  .message-text { font-size: 0.9rem; color: var(--ink-soft); line-height: 1.6; font-style: italic; }
  .empty-state { text-align: center; padding: 3rem 1.5rem; color: var(--ink-muted); }
  .empty-state p { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-style: italic; }
  .stats { text-align: center; padding: 1.5rem; background: rgba(184,147,90,0.06); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 2rem; }
  .stats-number { font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: var(--gold-dark); }
  .stats-label { font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-soft); }
  footer { text-align: center; margin-top: 3rem; font-size: 0.7rem; color: var(--ink-muted); letter-spacing: 0.08em; }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <p class="eyebrow">Livre d'or</p>
    <h1>Messages des invités</h1>
  </header>
  <div class="stats" id="stats" style="display:none;">
    <div class="stats-number" id="count">0</div>
    <div class="stats-label">Messages reçus</div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="tous">Tous</button>
    <button class="tab-btn" data-tab="messages">Messages</button>
    <button class="tab-btn" data-tab="photos">Photos</button>
  </div>
  <div class="loading" id="loading">Chargement des messages...</div>
  <div class="tab-content active" id="tab-tous">
    <div class="messages-list" id="messages-list-tous"></div>
    <div class="empty-state" id="empty-tous" style="display:none;"><p>Aucun message pour le moment.</p></div>
  </div>
  <div class="tab-content" id="tab-messages">
    <div class="messages-list" id="messages-list-messages"></div>
    <div class="empty-state" id="empty-messages" style="display:none;"><p>Aucun message vocal ou écrit pour le moment.</p></div>
  </div>
  <div class="tab-content" id="tab-photos">
    <div class="messages-list" id="messages-list-photos"></div>
    <div class="empty-state" id="empty-photos" style="display:none;"><p>Aucune photo pour le moment.</p></div>
  </div>
  <footer>Naomi &amp; Yoann · 10.11.2026</footer>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwV9Gjwy5882gYvxEu1qSkI4twyP-5VRB1aCwfFAtX2tRS_hfYGVQkW73SU0Won1pUg/exec";

let allMessages = [];

async function loadMessages() {
  try {
    const response = await fetch(APPS_SCRIPT_URL);
    const messages = await response.json();
    document.getElementById('loading').style.display = 'none';
    allMessages = messages || [];

    if (!allMessages.length) {
      document.getElementById('empty-tous').style.display = 'block';
      document.getElementById('empty-messages').style.display = 'block';
      document.getElementById('empty-photos').style.display = 'block';
      return;
    }

    allMessages.sort((a, b) => a.name.localeCompare(b.name, 'fr'));
    document.getElementById('stats').style.display = 'block';
    document.getElementById('count').textContent = allMessages.length;
    renderTab('tous');
    renderTab('messages');
    renderTab('photos');
  } catch (error) {
    document.getElementById('loading').innerHTML = 'Erreur lors du chargement.';
  }
}

function renderTab(tabName) {
  const list = document.getElementById(`messages-list-${tabName}`);
  const empty = document.getElementById(`empty-${tabName}`);
  list.innerHTML = '';
  empty.style.display = 'none';

  let msgs = allMessages;
  if (tabName === 'messages') msgs = allMessages.filter(m => m.audio || m.notes);
  if (tabName === 'photos') msgs = allMessages.filter(m => m.photo);
  if (!msgs.length) { empty.style.display = 'block'; return; }

  msgs.forEach(msg => {
    const div = document.createElement('div');
    div.className = 'message-item';

    const time = new Date(msg.time).toLocaleString('fr-FR', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });

    let content = '';
    const mimeType = msg.audioMimeType || 'audio/mp4';

    if (tabName === 'tous') {
      if (msg.photo) content += `<img src="${msg.photo}" class="photo-display">`;
      if (msg.audio) content += `<audio class="audio-player" controls>
        <source src="data:${mimeType};base64,${msg.audio}" type="${mimeType}">
        <source src="data:audio/mp4;base64,${msg.audio}" type="audio/mp4">
        <source src="data:audio/webm;base64,${msg.audio}" type="audio/webm">
      </audio>`;
      if (msg.notes) content += `<div class="message-text">"${msg.notes}"</div>`;
    }
    if (tabName === 'messages') {
      if (msg.audio) content += `<audio class="audio-player" controls>
        <source src="data:${mimeType};base64,${msg.audio}" type="${mimeType}">
        <source src="data:audio/mp4;base64,${msg.audio}" type="audio/mp4">
        <source src="data:audio/webm;base64,${msg.audio}" type="audio/webm">
      </audio>`;
      if (msg.notes) content += `<div class="message-text">"${msg.notes}"</div>`;
    }
    if (tabName === 'photos') {
      content += `<img src="${msg.photo}" class="photo-display">`;
    }

    div.innerHTML = `
      <div class="message-header">
        <div>
          <div class="message-name">${msg.name}</div>
          <div class="message-time">${time}</div>
        </div>
        <span style="color:var(--gold);">▼</span>
      </div>
      <div class="message-content">${content}</div>
    `;

    div.addEventListener('click', () => {
      div.querySelector('.message-content').classList.toggle('open');
      const arrow = div.querySelector('span');
      arrow.style.transform = div.querySelector('.message-content').classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
    });

    list.appendChild(div);
  });
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`tab-${btn.getAttribute('data-tab')}`).classList.add('active');
  });
});

loadMessages();
setInterval(loadMessages, 10000);
</script>
</body>
</html>
