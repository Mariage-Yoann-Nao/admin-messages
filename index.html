<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Livre d'Or</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #B8935A;
    --gold-light: #E8D5B0;
    --gold-dark: #8A6B3A;
    --cream: #FAF7F2;
    --ink: #1C1812;
    --ink-soft: #4A4438;
    --ink-muted: #8A8070;
    --border: rgba(184,147,90,0.25);
    --radius: 4px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: #FAF7F2;
    color: var(--ink);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .wrapper {
    max-width: 700px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    padding: 2rem 0 2.5rem;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 2.5rem;
  }

  .eyebrow {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1rem;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 2.4rem;
    line-height: 1.1;
    color: var(--ink);
    letter-spacing: 0.02em;
  }

  .tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
    border-bottom: 0.5px solid var(--border);
    overflow-x: auto;
  }

  .tab-btn {
    padding: 0.9rem 1.2rem;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-muted);
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    white-space: nowrap;
  }

  .tab-btn:hover {
    color: var(--ink-soft);
  }

  .tab-btn.active {
    color: var(--gold-dark);
    border-bottom-color: var(--gold-dark);
  }

  .tab-content {
    display: none;
  }

  .tab-content.active {
    display: block;
  }

  .loading {
    text-align: center;
    padding: 2rem;
    color: var(--ink-muted);
    font-style: italic;
  }

  .messages-list {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .message-item {
    background: #fff;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
  }

  .message-item:hover {
    border-color: var(--gold);
    box-shadow: 0 2px 8px rgba(184,147,90,0.1);
  }

  .message-header {
    padding: 1.2rem 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fff;
  }

  .message-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-weight: 400;
    color: var(--ink);
  }

  .message-time {
    font-size: 0.75rem;
    color: var(--ink-muted);
    letter-spacing: 0.05em;
  }

  .message-content {
    display: none;
    padding: 1.2rem 1.5rem;
    background: rgba(184,147,90,0.03);
    border-top: 0.5px solid var(--border);
  }

  .message-content.open {
    display: block;
  }

  .audio-player {
    width: 100%;
    height: 40px;
    margin-bottom: 1rem;
  }

  .photo-display {
    max-width: 100%;
    border-radius: var(--radius);
    margin-bottom: 1rem;
    border: 0.5px solid var(--border);
  }

  .message-text {
    font-size: 0.9rem;
    color: var(--ink-soft);
    line-height: 1.6;
    font-style: italic;
  }

  .no-text {
    color: var(--ink-muted);
    font-size: 0.85rem;
  }

  .empty-state {
    text-align: center;
    padding: 3rem 1.5rem;
    color: var(--ink-muted);
  }

  .empty-state p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-style: italic;
    line-height: 1.8;
  }

  .stats {
    text-align: center;
    padding: 1.5rem;
    background: rgba(184,147,90,0.06);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 2rem;
  }

  .stats-number {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 400;
    color: var(--gold-dark);
  }

  .stats-label {
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  footer {
    text-align: center;
    margin-top: 3rem;
    font-size: 0.7rem;
    color: var(--ink-muted);
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <p class="eyebrow">Livre d'or</p>
    <h1>Messages des invités</h1>
  </header>

  <div class="stats" id="stats" style="display: none;">
    <div class="stats-number" id="count">0</div>
    <div class="stats-label">Messages reçus</div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab-btn active" data-tab="tous">Tous</button>
    <button class="tab-btn" data-tab="messages">Messages</button>
    <button class="tab-btn" data-tab="photos">Photos</button>
  </div>

  <div class="loading" id="loading">Chargement des messages...</div>

  <div class="tab-content active" id="tab-tous">
    <div class="messages-list" id="messages-list-tous"></div>
    <div class="empty-state" id="empty-tous" style="display: none;">
      <p>Aucun message pour le moment.</p>
    </div>
  </div>

  <div class="tab-content" id="tab-messages">
    <div class="messages-list" id="messages-list-messages"></div>
    <div class="empty-state" id="empty-messages" style="display: none;">
      <p>Aucun message vocal ou écrit pour le moment.</p>
    </div>
  </div>

  <div class="tab-content" id="tab-photos">
    <div class="messages-list" id="messages-list-photos"></div>
    <div class="empty-state" id="empty-photos" style="display: none;">
      <p>Aucune photo pour le moment.</p>
    </div>
  </div>

  <footer>Naomi &amp; Yoann · 10.11.2026</footer>

</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby2CtMQxokINBujN6hR_yFuttVN7AMUZ_FZ7OY9TArLxmj5M2bqt0BLoTHZoYgMTE8e/exec";

let allMessages = [];

async function loadMessages() {
  try {
    const response = await fetch(APPS_SCRIPT_URL);
    const messages = await response.json();

    const loadingDiv = document.getElementById('loading');
    const statsDiv = document.getElementById('stats');
    const countDiv = document.getElementById('count');

    loadingDiv.style.display = 'none';

    allMessages = messages || [];

    if (!allMessages || allMessages.length === 0) {
      document.getElementById('empty-tous').style.display = 'block';
      document.getElementById('empty-messages').style.display = 'block';
      document.getElementById('empty-photos').style.display = 'block';
      return;
    }

    allMessages.sort((a, b) => a.name.localeCompare(b.name, 'fr'));

    statsDiv.style.display = 'block';
    countDiv.textContent = allMessages.length;

    renderTab('tous');
    renderTab('messages');
    renderTab('photos');

  } catch (error) {
    console.error('Erreur:', error);
    document.getElementById('loading').innerHTML = 'Erreur lors du chargement. Vérifiez l\'URL de l\'Apps Script.';
  }
}

function renderTab(tabName) {
  const messagesList = document.getElementById(`messages-list-${tabName}`);
  const emptyState = document.getElementById(`empty-${tabName}`);
  
  messagesList.innerHTML = '';
  emptyState.style.display = 'none';

  let filteredMessages = allMessages;

  if (tabName === 'messages') {
    filteredMessages = allMessages.filter(msg => msg.audio || msg.notes);
  } else if (tabName === 'photos') {
    filteredMessages = allMessages.filter(msg => msg.photo);
  }

  if (filteredMessages.length === 0) {
    emptyState.style.display = 'block';
    return;
  }

  filteredMessages.forEach((msg) => {
    const msgDiv = document.createElement('div');
    msgDiv.className = 'message-item';

    const timeStr = new Date(msg.time).toLocaleString('fr-FR', {
      day: '2-digit',
      month: '2-digit',
      year: 'numeric',
      hour: '2-digit',
      minute: '2-digit'
    });

    let contentHTML = '';

    if (tabName === 'tous') {
      if (msg.photo) {
        contentHTML += `<img src="${msg.photo}" class="photo-display" alt="Photo">`;
      }
      if (msg.audio) {
        contentHTML += `<audio class="audio-player" controls>
          <source src="data:audio/webm;base64,${msg.audio}" type="audio/webm">
          Votre navigateur ne supporte pas l'audio.
        </audio>`;
      }
      if (msg.notes) {
        contentHTML += `<div class="message-text">"${msg.notes}"</div>`;
      }
    }

    else if (tabName === 'messages') {
      if (msg.audio) {
        contentHTML += `<audio class="audio-player" controls>
          <source src="data:audio/webm;base64,${msg.audio}" type="audio/webm">
          Votre navigateur ne supporte pas l'audio.
        </audio>`;
      }
      if (msg.notes) {
        contentHTML += `<div class="message-text">"${msg.notes}"</div>`;
      } else if (msg.audio) {
        contentHTML += '<div class="no-text">(Message vocal uniquement)</div>';
      }
    }

    else if (tabName === 'photos') {
      contentHTML += `<img src="${msg.photo}" class="photo-display" alt="Photo">`;
    }

    msgDiv.innerHTML = `
      <div class="message-header">
        <div>
          <div class="message-name">${msg.name}</div>
          <div class="message-time">${timeStr}</div>
        </div>
        <span style="color: var(--gold); font-size: 1.2rem;">▼</span>
      </div>
      <div class="message-content">
        ${contentHTML}
      </div>
    `;

    msgDiv.addEventListener('click', () => {
      msgDiv.querySelector('.message-content').classList.toggle('open');
      const arrow = msgDiv.querySelector('span');
      if (msgDiv.querySelector('.message-content').classList.contains('open')) {
        arrow.style.transform = 'rotate(180deg)';
      } else {
        arrow.style.transform = 'rotate(0deg)';
      }
    });

    messagesList.appendChild(msgDiv);
  });
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

    btn.classList.add('active');
    const tabName = btn.getAttribute('data-tab');
    document.getElementById(`tab-${tabName}`).classList.add('active');
  });
});

loadMessages();

setInterval(loadMessages, 10000);
</script>
</body>
</html>
